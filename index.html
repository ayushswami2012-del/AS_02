<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Stopwatch</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="background-animation">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
</div>

<div class="container">

    <h1>
        <i class="fa-solid fa-stopwatch"></i>
        Stopwatch
    </h1>

    <p class="subtitle">
        Modern Stopwatch with Lap Tracking
    </p>

    <div class="stopwatch-card">

        <div class="circle">

            <div class="display-wrapper">

                <div id="display" class="time-display">
                    00:00:00
                </div>

                <div id="milliseconds" class="milliseconds">
                    000
                </div>

            </div>

        </div>

        <div class="buttons">

            <button id="startPauseBtn" class="btn start">
                <i class="fa-solid fa-play"></i>
                <span>Start</span>
            </button>

            <button id="lapBtn" class="btn lap">
                <i class="fa-solid fa-flag"></i>
                <span>Lap</span>
            </button>

            <button id="resetBtn" class="btn reset">
                <i class="fa-solid fa-rotate-left"></i>
                <span>Reset</span>
            </button>

        </div>

    </div>

    <div class="stats">

        <div class="stat-card">
            <i class="fa-solid fa-clock"></i>
            <h3>Total Laps</h3>
            <span id="lapCount">0</span>
        </div>

        <div class="stat-card">
            <i class="fa-solid fa-bolt"></i>
            <h3>Fastest</h3>
            <span id="fastestLap">--</span>
        </div>

        <div class="stat-card">
            <i class="fa-solid fa-hourglass-half"></i>
            <h3>Slowest</h3>
            <span id="slowestLap">--</span>
        </div>

    </div>

    <div class="event-input-container">
  <input
    type="text"
    id="eventMessage"
    placeholder="Enter event or note for this lap..."
    maxlength="50"
  >
</div>

    <div class="laps-container">

        <div class="lap-header">

            <h2>
                <i class="fa-solid fa-list"></i>
                Lap Records
            </h2>

            <button id="clearLaps" class="clear-btn">
                <i class="fa-solid fa-trash"></i>
                Clear
            </button>

        </div>

        <ul id="laps" class="lap-list"></ul>

    </div>

</div>

<footer>
    Press <b>Space</b> = Start/Pause |
    <b>L</b> = Lap |
    <b>R</b> = Reset
</footer>

<script src="script.js"></script>

</body>
</html>
